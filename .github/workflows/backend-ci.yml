name: Backend CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      JWT_SECRET: directads-ci-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/directads?schema=public
      TOTP_APP_NAME: DirectAds CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build
        run: yarn build

      - name: Unit tests
        run: yarn test

      - name: Integration tests
        run: yarn test:integration

      - name: Coverage
        run: yarn test:cov

      - name: E2E tests
        run: yarn test:e2e
