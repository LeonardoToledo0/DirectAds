services:
  postgres:
    image: postgres:16-alpine
    container_name: directads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: directads
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d directads']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: directads-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: directads-dev-secret
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/directads?schema=public
      TOTP_APP_NAME: DirectAds
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
